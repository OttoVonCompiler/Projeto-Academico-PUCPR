<!DOCTYPE html>
<html>
<head>
    <title>Meu Cloud Pessoal</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family: 'Segoe UI', sans-serif;background-color:grey;color:black}

        .app{max-width:900px;margin:0 auto;padding:24px 16px}

        .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
        .topbar-title{display:flex;align-items:center;gap:10px}
        .topbar-title svg{width:22px;height:22px;}
        .topbar-title h1{font-size:18px;font-weight:500;}

        .upload-zone{background-color: white;border:1.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:28px 24px;text-align:center;cursor:pointer;transition:border-color .18s,background .18s;margin-bottom:24px}
        .upload-zone.drag{border-color:#378ADD;}
        .upload-zone svg{width:32px;height:32px;;margin-bottom:10px}
        .upload-zone p{font-size:13px;;margin-bottom:14px}
        .upload-zone p span{cursor:pointer}
        .upload-zone input[type=file]{display:none}

        .upload-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;padding:8px 20px;border-radius:var(--border-radius-md);border:1px solid #378ADD;cursor:pointer;transition:opacity .15s}
        .upload-btn:hover{opacity:.82}
        .upload-btn svg{width:14px;height:14px}

        .progress-wrap{margin-top:16px;;border-radius:999px;height:6px;overflow:hidden;display:none}
        .progress-bar{height:100%;width:0%;background:#378ADD;border-radius:999px;transition:width .2s}

        .toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px}
        .filter-input{flex:1;height:34px;font-size:13px;padding:0 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background-color: white;color:var(--color-text-primary)}
        .filter-input:focus{outline:none;border-color:#378ADD}
        .type-pill{font-size:12px;padding:4px 12px;border-radius:999px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;transition:background .15s}
        .type-pill.active{background:var(--color-background-info);border-color:#85B7EB;color:var(--color-text-info)}

        .section-label{font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px}

        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:28px}

        .card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s}
        .card:hover{border-color:var(--color-border-secondary);transform:translateY(-2px)}
        .card-thumb{width:100%;height:120px;object-fit:cover;display:block}
        .card-thumb-video{width:100%;height:120px;background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;position:relative}
        .card-thumb-video svg{width:28px;height:28px;color:var(--color-text-tertiary);position:relative;z-index:1}
        .card-body{padding:10px 12px 12px}
        .card-name{font-size:12px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .card-type{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
        .card-actions{display:flex;gap:6px;margin-top:8px}
        .card-btn{flex:1;font-size:11px;padding:4px 0;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;cursor:pointer;transition:background .15s}
        .card-btn:hover{background:var(--color-background-secondary)}
        .card-btn.del:hover{background:#FCEBEB;border-color:#F09595;color:#A32D2D}

        .empty{text-align:center;padding:48px 24px;color:var(--color-text-tertiary);font-size:13px}
        .empty svg{width:36px;height:36px;margin-bottom:10px;opacity:.4}

        .modal-wrap{display:none;min-height:480px;background:rgba(0,0,0,.6);border-radius:var(--border-radius-lg);flex-direction:column;align-items:center;justify-content:center;position:relative;padding:32px 24px}
        .modal-wrap.open{display:flex}
        .modal-content{max-width:100%;display:flex;align-items:center;justify-content:center}
        .modal-content img,.modal-content video{max-width:100%;max-height:340px;border-radius:var(--border-radius-md)}
        .modal-footer{display:flex;align-items:center;justify-content:space-between;width:100%;margin-top:14px}
        .modal-name{font-size:13px;color:rgba(255,255,255,.8)}
        .modal-btns{display:flex;gap:8px}
        .modal-btn{font-size:12px;padding:6px 16px;border-radius:var(--border-radius-md);border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:rgba(255,255,255,.9);cursor:pointer;transition:background .15s}
        .modal-btn:hover{background:rgba(255,255,255,.22)}
        .modal-btn.del{border-color:rgba(240,149,149,.5);color:#F09595}
        .modal-btn.del:hover{background:rgba(162,45,45,.3)}

        .toast{display:none;position:relative;margin-top:12px;padding:10px 16px;border-radius:var(--border-radius-md);font-size:13px;text-align:center}
        .toast.success{display:block;background:var(--color-background-success);color:var(--color-text-success);border:0.5px solid var(--color-border-success)}
        .toast.error{display:block;background:var(--color-background-danger);color:var(--color-text-danger);border:0.5px solid var(--color-border-danger)}
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div class="topbar-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/></svg>
            <h1>Meu cloud pessoal</h1>
            </div>
            <span class="topbar-meta" id="file-count">0 arquivos</span>
        </div>

        <div class="upload-zone" id="drop-zone" onclick="document.getElementById('fileInput').click()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
            <p>Arraste arquivos aqui ou <span>selecione do dispositivo</span></p>
            <input type="file" id="fileInput" onchange="handleFileSelect(this)">
            <div id="selected-name" style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:10px;display:none"></div>
            <button class="upload-btn" onclick="event.stopPropagation();uploadFile()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
            Enviar arquivo
            </button>
            <div class="progress-wrap" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>

        <div id="toast" class="toast"></div>

        <div class="toolbar">
            <input class="filter-input" id="searchInput" type="text" placeholder="Buscar por nome..." oninput="renderGallery()">
            <button class="type-pill active" data-type="all" onclick="setFilter(this)">Todos</button>
            <button class="type-pill" data-type="image" onclick="setFilter(this)">Fotos</button>
            <button class="type-pill" data-type="video" onclick="setFilter(this)">Vídeos</button>
        </div>

        <p class="section-label" id="gallery-label">Galeria</p>
        <div class="grid" id="lista"></div>

        <div class="modal-wrap" id="modalDestaque">
            <div class="modal-content" id="modalConteudo"></div>
            <div class="modal-footer">
            <span class="modal-name" id="nomeArquivoDestaque"></span>
            <div class="modal-btns">
                <button class="modal-btn del" onclick="deletarDestaque()">Excluir</button>
                <button class="modal-btn" onclick="downloadDestaque()">Baixar</button>
                <button class="modal-btn" onclick="fecharModal()">Fechar</button>
            </div>
            </div>
        </div>
    </div>

    <script>
    const API_URL = "http://xxx.xxx.xxx.xxx:3001";
    let allFiles = [];
    let currentItem = null;
    let activeFilter = 'all';

    const dropZone = document.getElementById('drop-zone');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
    dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (f) { document.getElementById('fileInput').files = e.dataTransfer.files; showSelectedName(f.name); }
    });

    function handleFileSelect(input) {
        if (input.files[0]) showSelectedName(input.files[0].name);
    }

    function showSelectedName(name) {
        const el = document.getElementById('selected-name');
        el.textContent = name; el.style.display = 'block';
    }

    function setFilter(btn) {
        document.querySelectorAll('.type-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.type;
        renderGallery();
    }

    function renderGallery() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const lista = document.getElementById('lista');
        lista.innerHTML = '';
        const filtered = allFiles.filter(item => {
            const matchSearch = item.nome_original.toLowerCase().includes(query);
            const matchType = activeFilter === 'all' || item.tipo.includes(activeFilter);
            return matchSearch && matchType;
        });
        document.getElementById('file-count').textContent = allFiles.length + ' arquivo' + (allFiles.length !== 1 ? 's' : '');
        document.getElementById('gallery-label').textContent = filtered.length + ' resultado' + (filtered.length !== 1 ? 's' : '');
        if (!filtered.length) {
            lista.innerHTML = '<div class="empty" style="grid-column:1/-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg><p>Nenhum arquivo encontrado</p></div>';
            return;
        }
        filtered.forEach(item => lista.appendChild(renderCard(item)));
    }

    function renderCard(item) {
        const streamUrl = `${API_URL}/stream/${item.nome_servidor}`;
        const div = document.createElement('div');
        div.className = 'card';
        const isVideo = item.tipo.includes('video');
        const thumb = isVideo
            ? `<div class="card-thumb-video"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3" fill="currentColor" opacity=".4"/></svg></div>`
            : `<img class="card-thumb" src="${streamUrl}" alt="${item.nome_original}" loading="lazy">`;
        div.innerHTML = `
            ${thumb}
            <div class="card-body">
            <p class="card-name">${item.nome_original}</p>
            <p class="card-type">${isVideo ? 'vídeo' : 'imagem'}</p>
            <div class="card-actions">
                <button class="card-btn" onclick="event.stopPropagation();abrirDestaque(${JSON.stringify(item).replace(/"/g,'&quot;')})">Ver</button>
                <button class="card-btn del" onclick="event.stopPropagation();deletarArquivo(${item.id})">Excluir</button>
            </div>
            </div>`;
        div.addEventListener('click', () => abrirDestaque(item));
        return div;
    }

    function abrirDestaque(item) {
        currentItem = item;
        const streamUrl = `${API_URL}/stream/${item.nome_servidor}`;
        const c = document.getElementById('modalConteudo');
        c.innerHTML = item.tipo.includes('video')
            ? `<video src="${streamUrl}" controls autoplay style="max-width:100%;max-height:340px;border-radius:var(--border-radius-md)"></video>`
            : `<img src="${streamUrl}" style="max-width:100%;max-height:340px;border-radius:var(--border-radius-md)">`;
        document.getElementById('nomeArquivoDestaque').textContent = item.nome_original;
        document.getElementById('modalDestaque').classList.add('open');
    }
    
    function fecharModal() {
        document.getElementById('modalConteudo').innerHTML = '';
        document.getElementById('modalDestaque').classList.remove('open');
        currentItem = null;
    }
    
    function deletarDestaque() {
        if (currentItem) { deletarArquivo(currentItem.id); fecharModal(); }
    }

    function downloadDestaque() {
        if (!currentItem) return;
        const a = document.createElement('a');
        a.href = `${API_URL}/stream/${currentItem.nome_servidor}`;
        a.download = currentItem.nome_original;
        a.click();
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharModal(); });
    document.getElementById('modalDestaque').addEventListener('click', function(e) {
        if (e.target === this) fecharModal();
    });

    function showToast(msg, type='success') {
        const t = document.getElementById('toast');
        t.textContent = msg; t.className = 'toast ' + type;
        setTimeout(() => { t.className = 'toast'; }, 3500);
    }

    async function carregarArquivos() {
        try {
            const res = await fetch(`${API_URL}/arquivos`);
            allFiles = await res.json();
            renderGallery();
        } catch (e) { showToast('Erro ao carregar arquivos.', 'error'); }
    }

    async function deletarArquivo(id) {
        try {
            await fetch(`${API_URL}/arquivos/${id}`, { method: 'DELETE' });
            allFiles = allFiles.filter(f => f.id !== id);
            renderGallery();
            showToast('Arquivo excluído.');
        } catch (e) { showToast('Erro ao excluir.', 'error'); }
    }

    function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        if (!fileInput.files[0]) { showToast('Selecione um arquivo primeiro.', 'error'); return; }
        const formData = new FormData();
        formData.append('arquivo', fileInput.files[0]);
        const xhr = new XMLHttpRequest();
        xhr.open('POST', `${API_URL}/upload`, true);
        progressContainer.style.display = 'block';
        xhr.upload.onprogress = e => {
            if (e.lengthComputable) progressBar.style.width = ((e.loaded/e.total)*100)+'%';
        };
        xhr.onload = () => {
            progressContainer.style.display = 'none'; progressBar.style.width = '0%';
            if (xhr.status === 200) {
            fileInput.value = '';
            document.getElementById('selected-name').style.display = 'none';
            showToast('Upload concluído!', 'success');
            carregarArquivos();
            } else { showToast('Erro no upload.', 'error'); }
        };
        xhr.send(formData);
    }

    carregarArquivos();
    </script>
</body>
</html>
