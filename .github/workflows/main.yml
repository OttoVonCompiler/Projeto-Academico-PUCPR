name: PROJETO PUCPR

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  Trabalho-Academico:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Dependências
        run: npm install

      - name: Executar Testes Unitários
        run: npm test

      - name: Simular Deploy
        if: success()
        run: echo "Deploy realizado com sucesso na branch main!"

      - name: Notificação no Discord
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DC_NOTI }}
          content: "📢 **Relatório de Pipeline**\nRepositório: ${{ github.repository }}\nStatus final: ${{ job.status }}\nCommit: ${{ github.event.head_commit.message }}"