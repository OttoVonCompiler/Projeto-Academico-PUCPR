name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Instalar dependências
      run: npm install || true
      
    - name: Finalizar Build
      run: echo "Build concluído com sucesso!"
      